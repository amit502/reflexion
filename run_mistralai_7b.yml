apiVersion: v1
kind: Pod
metadata:
  name: llm-server
  namespace: kc-ai-research-lab
  labels:
    app: llm-server
spec:
  restartPolicy: Never
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                  - Tesla-T4
                  - Tesla-V100
                  - NVIDIA-GeForce-RTX-3090
                  - NVIDIA-TITAN-RTX
  containers:
    - name: llm-server
      image: vllm/vllm-openai:latest
      ports:
        - containerPort: 8000
      env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: token
      args:
        - "--model"
        - "mistralai/Mistral-7B-Instruct-v0.1"
        - "--download-dir"
        - "/models"
        - "--dtype"
        - "float16"
      resources:
        requests:
          nvidia.com/gpu: 1
          memory: 14Gi
          cpu: "3"
        limits:
          nvidia.com/gpu: 1
          memory: 14Gi
          cpu: "3"
      volumeMounts:
        - name: model-storage
          mountPath: /models
  volumes:
    - name: model-storage
      persistentVolumeClaim:
        claimName: llm-model-pvc
