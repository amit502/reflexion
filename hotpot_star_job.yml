apiVersion: batch/v1
kind: Job
metadata:
  name: hotpot-star-job
  namespace: kc-ai-research-lab
spec:
  template:
    spec:
      nodeSelector:
        topology.kubernetes.io/region: us-west
        nautilus.io/linstor: "true"
      containers:
        - name: reflexion-container
          image: ghcr.io/amit502/reflexion:latest
          env:
            - name: REPO_PATH
              value: /app/reflexion
            - name: RESULTS_PATH
              value: /results/hotpot/star
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: api-key
          command:
            - "bash"
            - "-c"
          args:
            - |
              git clone https://github.com/amit502/reflexion.git ${REPO_PATH}
              cd ${REPO_PATH}
              git checkout main
              pip install -r hotpotqa_runs/requirements.txt
              cd hotpotqa_runs/experiments

              python StarQA.py

              mkdir -p ${RESULTS_PATH}
              echo "Copying results to PVC..."
              cp -r ${REPO_PATH}/hotpotqa_runs/root/ReAct/star/ ${RESULTS_PATH}/
              echo "Results saved to PVC!"
              echo "Job complete!"
          volumeMounts:
            - name: git-repo
              mountPath: /app
            - name: results-volume
              mountPath: /results
          resources:
            limits:
              memory: 2Gi
              cpu: "1"
            requests:
              memory: 2Gi
              cpu: "1"
      volumes:
        - name: git-repo
          emptyDir: {}
        - name: results-volume
          persistentVolumeClaim:
            claimName: reflexion-data-pvc
      restartPolicy: Never
  backoffLimit: 1
